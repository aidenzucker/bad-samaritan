<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Confession background layer */
        #confessions-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .confession-bg {
            position: absolute;
            font-size: 0.85rem;
            line-height: 1.4;
            max-width: 280px;
            opacity: 0;
            transition: opacity 2s ease;
            color: #555;
            font-style: italic;
        }

        .confession-bg.visible { opacity: 1; }
        .confession-bg.fading { opacity: 0; }

        .confession-bg .location {
            display: block;
            font-size: 0.7rem;
            color: #3a3a3a;
            font-style: normal;
            margin-top: 0.3rem;
        }

        /* Center content */
        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            width: 100%;
        }

        .logo {
            width: min(280px, 60vw);
            height: min(280px, 60vw);
            margin: 0 auto 2rem;
        }

        /* Shared form styles */
        .form-row {
            display: flex;
            align-items: stretch;
            max-width: 360px;
            margin: 0 auto;
        }

        .form-row input,
        .form-row textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px 0 0 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .form-row textarea {
            resize: none;
            font-family: inherit;
            line-height: 1.4;
            min-height: 2.9rem;
            max-height: calc(1rem * 1.4 * 2 + 1.5rem);
            overflow-y: auto;
            field-sizing: content;
        }

        .form-row input::placeholder,
        .form-row textarea::placeholder { color: #666; }
        .form-row input:focus,
        .form-row textarea:focus { border-color: #333; }

        .form-row button {
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-left: none;
            border-radius: 0 8px 8px 0;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.2s;
        }

        .form-row button:hover { color: #999; }
        .form-row button:disabled { opacity: 0.6; cursor: not-allowed; }

        .message {
            margin-top: 0;
            font-size: 0.95rem;
            color: #999;
            min-height: 0;
        }

        .message:not(:empty) {
            margin-top: 0.5rem;
            min-height: 1.2em;
        }

        /* Confession section (primary) */
        .confession-prompt {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 0.75rem;
            line-height: 1.5;
            text-align: left;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .confess-textarea {
            width: 100%;
            max-width: 360px;
            display: block;
            margin: 0 auto 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            resize: none;
            line-height: 1.4;
            min-height: 2.9rem;
            max-height: calc(1rem * 1.4 * 2 + 1.5rem);
            overflow-y: auto;
            field-sizing: content;
        }

        .confess-textarea::placeholder { color: #666; }
        .confess-textarea:focus { border-color: #333; }

        .confess-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            max-width: 360px;
            margin: 0 auto;
        }

        .confess-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .confess-btn:hover { color: #999; }

        .angel-link {
            font-size: 0.95rem;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .angel-link:hover { color: #999; }

        /* Confession preview */
        .preview-section {
            margin-top: 1.5rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        .preview-text {
            font-size: 0.95rem;
            color: #999;
            font-style: italic;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .location-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .location-row input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #888;
            font-size: 0.95rem;
            outline: none;
        }

        .location-row input:focus { border-color: #333; }

        .location-label {
            font-size: 0.95rem;
            color: #888;
        }

        .preview-submit {
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .preview-submit:hover { color: #999; }

        /* Post-confession feeling */
        .feeling-section {
            margin-top: 1.5rem;
        }

        .feeling-question {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 1rem;
            line-height: 1.5;
            text-align: left;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .feeling-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            max-width: 360px;
            margin: 0 auto;
        }

        .feeling-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: #999;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feeling-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        /* Quiz */
        .quiz-section {
            margin-top: 1.5rem;
        }

        .quiz-question {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .quiz-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .quiz-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: #999;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .quiz-response {
            font-size: 0.95rem;
            color: #888;
            margin-top: 1rem;
            line-height: 1.5;
        }

        /* Email section */
        .email-section {
            margin-top: 2rem;
        }

        .email-label {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 0.75rem;
            text-align: left;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Feeling response text */
        .feeling-response {
            font-size: 0.95rem;
            color: #888;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            text-align: left;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Transitions for sections */
        .hidden { display: none; }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="confessions-layer"></div>

    <div class="page-wrapper">
        <div class="container" id="center-content">
            <img src="logo.svg" alt="Bad Samaritan" class="logo">

            <!-- Primary: Confession -->
            <div id="confess-section">
                <p class="confession-prompt">what do you feel guilty about consuming?</p>
                <form id="confess">
                    <textarea class="confess-textarea" placeholder="i still listen to..." maxlength="200" required rows="1"></textarea>
                    <div class="confess-actions">
                        <button type="submit" class="confess-btn">Confess</button>
                        <span class="angel-link" id="angel-trigger">i'm innocent</span>
                    </div>
                </form>
                <p class="message" id="confess-message"></p>
            </div>

            <!-- Confession preview -->
            <div id="preview-section" class="preview-section hidden">
                <p class="preview-text" id="preview-text"></p>
                <div class="location-row">
                    <span class="location-label">from</span>
                    <input type="text" id="preview-location" placeholder="city, state">
                </div>
                <button class="preview-submit" id="preview-submit">submit confession</button>
            </div>

            <!-- Post-confession: How do you feel? -->
            <div id="feeling-section" class="feeling-section hidden">
                <p class="feeling-question">how do you feel after confessing?</p>
                <div class="feeling-options">
                    <button class="feeling-btn" data-feeling="fully relieved">fully relieved</button>
                    <button class="feeling-btn" data-feeling="a bit better">a bit better</button>
                    <button class="feeling-btn" data-feeling="the same">the same</button>
                    <button class="feeling-btn" data-feeling="a bit worse">a bit worse</button>
                    <button class="feeling-btn" data-feeling="way worse">way worse</button>
                </div>
            </div>

            <!-- Feeling response + email -->
            <div id="feeling-response-section" class="hidden">
                <p class="feeling-response" id="feeling-response-text"></p>
                <div class="email-section">
                    <p class="email-label" id="email-label"></p>
                    <form class="form-row" id="signup">
                        <input type="email" placeholder="you@email.com" required>
                        <button type="submit">Submit</button>
                    </form>
                    <p class="message" id="signup-message"></p>
                </div>
            </div>

            <!-- Angel quiz -->
            <div id="quiz-section" class="quiz-section hidden"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAdO1epB1vdko2EHzvsvyilsjD6heDXwQpluB0IHj0VR6iHQtI4HB-2kmRf4t8XLGxvA/exec';

        // ── Email signup ──
        document.getElementById('signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const input = e.target.querySelector('input');
            const msg = document.getElementById('signup-message');
            btn.disabled = true;
            btn.textContent = 'submitting...';
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'email=' + encodeURIComponent(input.value)
                });
                msg.textContent = "you're on the list.";
                input.value = '';
            } catch {
                msg.textContent = 'something went wrong. try again.';
            }
            btn.disabled = false;
            btn.textContent = 'Submit';
        });

        // ── Confession submission — step 1: show preview ──
        let pendingConfession = '';
        document.getElementById('confess').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = e.target.querySelector('textarea');
            pendingConfession = input.value;
            document.getElementById('preview-text').textContent = '"' + pendingConfession + '"';
            document.getElementById('preview-location').value = userCity;
            document.getElementById('confess-section').classList.add('hidden');
            const previewSection = document.getElementById('preview-section');
            previewSection.classList.remove('hidden');
            previewSection.classList.add('fade-in');
            input.value = '';
        });

        // ── Confession submission — step 2: submit from preview ──
        document.getElementById('preview-submit').addEventListener('click', async () => {
            const location = document.getElementById('preview-location').value;
            const btn = document.getElementById('preview-submit');
            btn.disabled = true;
            btn.textContent = 'submitting...';
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'confession=' + encodeURIComponent(pendingConfession) + '&location=' + encodeURIComponent(location)
                });
                document.getElementById('preview-section').classList.add('hidden');
                const feelSection = document.getElementById('feeling-section');
                feelSection.classList.remove('hidden');
                feelSection.classList.add('fade-in');
            } catch {
                btn.textContent = 'something went wrong. try again.';
            }
            btn.disabled = false;
            btn.textContent = 'submit confession';
        });

        // ── Post-confession feeling ──
        const feelingResponses = {
            'fully relieved': "confession really is good for the soul. but imagine if you could actually do something about it.",
            'a bit better': "that's a start. we're building something to help with the rest.",
            'the same': "yeah, confession alone doesn't cut it. we're working on that.",
            'a bit worse': "that tracks. awareness is the first step though.",
            'way worse': "sorry about that. good news: we're building a way to turn that guilt into something good."
        };

        document.querySelectorAll('.feeling-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const feeling = btn.dataset.feeling;

                // Send feeling to sheet
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'feeling=' + encodeURIComponent(feeling)
                });

                // Show response + email
                document.getElementById('feeling-section').classList.add('hidden');
                document.getElementById('feeling-response-text').textContent = feelingResponses[feeling];
                const responseSection = document.getElementById('feeling-response-section');
                responseSection.classList.remove('hidden');
                responseSection.classList.add('fade-in');
            });
        });

        // ── Angel quiz ──
        const quizQuestions = [
            {
                q: "do you listen to kanye?",
                gotcha: "there it is.",
                confession: "i listen to kanye"
            },
            {
                q: "have you watched a woody allen movie in the last year?",
                gotcha: "knew it.",
                confession: "i've watched a woody allen movie recently"
            },
            {
                q: "do you have a spotify playlist you'd never share?",
                gotcha: "we all do. what's on it?",
                confession: "i have a playlist i'd never share"
            },
            {
                q: "ever googled 'is [artist] problematic' and kept listening anyway?",
                gotcha: "respect the honesty.",
                confession: "i googled if they were problematic and kept listening"
            },
            {
                q: "ordered from shein or temu in the last 6 months?",
                gotcha: "no judgment. well, a little.",
                confession: "i ordered from shein recently"
            }
        ];

        let quizStep = 0;
        const quizSection = document.getElementById('quiz-section');

        document.getElementById('angel-trigger').addEventListener('click', () => {
            document.getElementById('confess-section').classList.add('hidden');
            quizSection.classList.remove('hidden');
            quizSection.classList.add('fade-in');
            quizStep = 0;
            showQuizStep();
        });

        function showQuizStep() {
            const step = quizQuestions[quizStep];

            if (quizStep > quizQuestions.length - 1) {
                // They said no to everything
                showQuizEnd();
                return;
            }

            quizSection.innerHTML = `
                <p class="quiz-question">${step.q}</p>
                <div class="quiz-buttons">
                    <button class="quiz-btn" id="quiz-yes">yes</button>
                    <button class="quiz-btn" id="quiz-no">no</button>
                </div>
            `;

            document.getElementById('quiz-yes').addEventListener('click', () => {
                // Gotcha — show response then open confession form
                quizSection.innerHTML = `<p class="quiz-response">${step.gotcha}</p>`;

                setTimeout(() => {
                    quizSection.classList.add('hidden');
                    const confessSection = document.getElementById('confess-section');
                    confessSection.classList.remove('hidden');
                    confessSection.classList.add('fade-in');
                    const input = confessSection.querySelector('textarea');
                    input.value = step.confession;
                    input.focus();
                }, 1500);
            });

            document.getElementById('quiz-no').addEventListener('click', () => {
                quizStep++;
                quizSection.classList.remove('fade-in');
                void quizSection.offsetWidth;
                quizSection.classList.add('fade-in');
                showQuizStep();
            });
        }

        function showQuizEnd() {
            quizSection.innerHTML = `
                <p class="quiz-question">wow, you are a wholesome saint. if you ever feel like you want to give in to temptation, we're here for you. be the first to know how to clean your conscience.</p>
            `;
            // Show email below after a beat
            setTimeout(() => {
                const responseSection = document.getElementById('feeling-response-section');
                document.getElementById('feeling-response-text').textContent = '';
                document.getElementById('email-label').style.display = 'none';
                responseSection.classList.remove('hidden');
                responseSection.classList.add('fade-in');
            }, 1500);
        }

        // ── Confession display engine ──
        const layer = document.getElementById('confessions-layer');
        let confessions = [];
        let confessionIndex = 0;

        const SEED_CONFESSIONS = [
            { text: "kanye gym playlist 💪 (headphones ALWAYS in)", location: "los angeles, ca" },
            { text: "i have a dedicated r kelly playlist and its called 'do not share'", location: "chicago, il" },
            { text: "manhattan is a perfect movie and i will die on this hill", location: "brooklyn, ny" },
            { text: "cosby show on sick days. every time", location: "philadelphia, pa" },
            { text: "my therapist doesnt know about my kevin spacey phase", location: "san francisco, ca" },
            { text: "louis ck's bit about being broke is funnier than anything on netflix rn", location: "austin, tx" },
            { text: "told my book club i was reading sally rooney. it was jk rowling", location: "portland, or" },
            { text: "i saw baby driver in theaters twice knowing about kevin spacey and id do it again", location: "atlanta, ga" },
            { text: "roman polanski's movies are incredible there i said it", location: "new york, ny" },
            { text: "i hum ignition remix in the shower", location: "denver, co" },
            { text: "blurred lines is a bop sorry", location: "miami, fl" },
            { text: "i quote kanye in work presentations", location: "seattle, wa" },
            { text: "woody allen's memoir is on my nightstand rn", location: "boston, ma" },
            { text: "my most played song last year was a chris brown feature", location: "houston, tx" },
            { text: "three chick fil a trips this week", location: "nashville, tn" },
            { text: "heard a morrissey song at a coffee shop and added it to my library before the chorus was over", location: "silver lake, ca" },
            { text: "shein haul video on my phone. 47 items", location: "phoenix, az" },
            { text: "joe rogan is how i fall asleep", location: "dallas, tx" },
            { text: "my comfort rewatch is the usual suspects", location: "chicago, il" },
            { text: "i still think annie hall is the best romcom ever made", location: "manhattan, ny" },
            { text: "XXXtentacion got me through a breakup and i dont know how to feel about that", location: "orlando, fl" }
        ];

        function getExclusionZone() {
            const el = document.getElementById('center-content');
            const rect = el.getBoundingClientRect();
            const pad = 20;
            return {
                left: rect.left - pad,
                right: rect.right + pad,
                top: rect.top - pad,
                bottom: rect.bottom + pad
            };
        }

        function getRandomPosition(zone) {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const maxWidth = 280;
            const estHeight = 40;
            const isMobile = vw < 600;
            const regions = [];

            if (zone.top > estHeight + 20) {
                regions.push({ xMin: 20, xMax: vw - maxWidth - 20, yMin: 20, yMax: zone.top - estHeight });
            }
            if (vh - zone.bottom > estHeight + 20) {
                regions.push({ xMin: 20, xMax: vw - maxWidth - 20, yMin: zone.bottom + 10, yMax: vh - estHeight - 20 });
            }
            if (!isMobile) {
                if (zone.left > maxWidth + 40) {
                    regions.push({ xMin: 20, xMax: zone.left - maxWidth - 10, yMin: 20, yMax: vh - estHeight - 20 });
                }
                if (vw - zone.right > maxWidth + 40) {
                    regions.push({ xMin: zone.right + 10, xMax: vw - maxWidth - 20, yMin: 20, yMax: vh - estHeight - 20 });
                }
            }

            if (regions.length === 0) return { x: 20, y: 20 };

            const region = regions[Math.floor(Math.random() * regions.length)];
            return {
                x: Math.max(10, Math.min(region.xMin + Math.random() * (region.xMax - region.xMin), vw - maxWidth - 10)),
                y: Math.max(10, region.yMin + Math.random() * (region.yMax - region.yMin))
            };
        }

        const MAX_VISIBLE = 3;
        const activeConfessions = [];

        function rectsOverlap(a, b) {
            return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
        }

        function showConfession() {
            if (confessions.length === 0) return;
            if (activeConfessions.length >= MAX_VISIBLE) return;

            const item = confessions[confessionIndex % confessions.length];
            confessionIndex++;

            const zone = getExclusionZone();

            // Try up to 10 positions to avoid overlapping existing confessions
            let pos = null;
            for (let attempt = 0; attempt < 10; attempt++) {
                const candidate = getRandomPosition(zone);
                const candidateRect = {
                    left: candidate.x,
                    top: candidate.y,
                    right: candidate.x + 280,
                    bottom: candidate.y + 60
                };
                const overlaps = activeConfessions.some(ac => rectsOverlap(candidateRect, ac.rect));
                if (!overlaps) {
                    pos = candidate;
                    break;
                }
            }
            if (!pos) return; // No non-overlapping position found, skip this cycle

            const el = document.createElement('div');
            el.className = 'confession-bg';
            el.innerHTML = item.text + (item.location ? '<span class="location">— ' + item.location + '</span>' : '');
            el.style.left = pos.x + 'px';
            el.style.top = pos.y + 'px';

            const colors = ['#444', '#555', '#4a4a4a', '#505050', '#5a5a5a', '#484848'];
            el.style.color = colors[Math.floor(Math.random() * colors.length)];

            layer.appendChild(el);

            const confessionEntry = {
                el,
                rect: { left: pos.x, top: pos.y, right: pos.x + 280, bottom: pos.y + 60 }
            };
            activeConfessions.push(confessionEntry);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => { el.classList.add('visible'); });
            });

            const linger = 6000 + Math.random() * 4000;
            setTimeout(() => {
                el.classList.remove('visible');
                el.classList.add('fading');
                const idx = activeConfessions.indexOf(confessionEntry);
                if (idx > -1) activeConfessions.splice(idx, 1);
                setTimeout(() => el.remove(), 2000);
            }, linger);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        async function loadConfessions() {
            try {
                const res = await fetch(SCRIPT_URL + '?action=confessions');
                const data = await res.json();
                if (data && data.length > 0) {
                    confessions = shuffle(data);
                } else {
                    confessions = shuffle([...SEED_CONFESSIONS]);
                }
            } catch {
                confessions = shuffle([...SEED_CONFESSIONS]);
            }
            showConfession();
            setInterval(showConfession, 3500);
        }

        let userCity = '';
        fetch('https://ipapi.co/json/')
            .then(r => r.json())
            .then(d => {
                if (!d.city) return;
                if (d.country_code === 'US') {
                    userCity = d.city.toLowerCase() + ', ' + (d.region_code || '').toLowerCase();
                } else {
                    userCity = d.city.toLowerCase() + ', ' + (d.country_name || '').toLowerCase();
                }
            })
            .catch(() => {});

        loadConfessions();
    </script>
</body>
</html>
